listen:
  address: "0.0.0.0"
  port: 8443
  ssl:
    enabled: true
    cert: "/certs/fullchain.pem"
    key: "/certs/privkey.pem"

routes:
  - path_prefix: "/"
    backends:
      - host: "backend1.example.com"
        port: 8080
        weight: 10
      - host: "backend2.example.com"
        port: 8080
        weight: 5
    strategy: "round_robin"        # round_robin, random, least_connections
    timeout_ms: 5000
    retry: 2

health_check:
  enabled: true
  interval_seconds: 15
  timeout_seconds: 5
  path: "/health"
